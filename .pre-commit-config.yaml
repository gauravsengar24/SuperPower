repos:
  - repo: local
    hooks:
      - id: ruff-check-trading
        name: trading ruff check
        entry: ruff check trading/
        language: system
        files: ^trading/.*\.py$

      - id: ruff-format-check
        name: ruff format --check
        entry: ruff format --check .
        language: system
        pass_filenames: false
